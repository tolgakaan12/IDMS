name: idms
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy
  - scipy
  - pandas
  - h5py
  - scikit-learn
  - matplotlib
  - seaborn
  - tqdm
  - statsmodels>=0.14
  - pip:
      # All three contributions are PyTorch (no TensorFlow).
      - torch>=2.2
      - einops
      - arch            # ARMA-GARCH volatility modelling
